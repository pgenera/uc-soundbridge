<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" width="90" height="90">
  <defs>
    <!-- Silver brushed-metal body -->
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#3a3d42"/>
      <stop offset="0.18" stop-color="#9aa0a6"/>
      <stop offset="0.5"  stop-color="#cfd3d8"/>
      <stop offset="0.82" stop-color="#7d8086"/>
      <stop offset="1"    stop-color="#2a2c30"/>
    </linearGradient>
    <!-- End-cap (slightly darker) -->
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#2c2e32"/>
      <stop offset="0.5" stop-color="#5b5e63"/>
      <stop offset="1"   stop-color="#1a1b1d"/>
    </linearGradient>
    <!-- VFD aqua glow -->
    <radialGradient id="vfdGlow" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0"   stop-color="#bff3ff"/>
      <stop offset="0.45" stop-color="#3fd4ff"/>
      <stop offset="1"   stop-color="#0a3a55"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="0.9"/>
      <feComponentTransfer><feFuncA type="linear" slope="1.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- soft drop shadow -->
  <ellipse cx="45" cy="78" rx="34" ry="3" fill="#000" opacity="0.35"/>

  <!-- left end cap -->
  <rect x="6" y="28" width="6" height="34" rx="3" fill="url(#cap)"/>
  <!-- main tube body -->
  <rect x="10" y="26" width="70" height="38" rx="6" fill="url(#body)" stroke="#1a1b1d" stroke-width="0.6"/>
  <!-- right end cap -->
  <rect x="78" y="28" width="6" height="34" rx="3" fill="url(#cap)"/>

  <!-- VFD bezel (recessed black) -->
  <rect x="16" y="36" width="58" height="18" rx="2.5" fill="#0a0d10" stroke="#000" stroke-width="0.5"/>

  <!-- VFD display surface -->
  <rect x="17.5" y="37.5" width="55" height="15" rx="1.5" fill="url(#vfdGlow)" opacity="0.95"/>

  <!-- VFD pixel text: ♪ + bars (now playing) -->
  <g fill="#eafcff" filter="url(#glow)" font-family="monospace">
    <!-- music note -->
    <path d="M22 41 L22 48.5 A1.6 1.6 0 1 1 20.4 47 L20.4 42.5 L26.6 41.4 L26.6 47.7 A1.6 1.6 0 1 1 25 46.2 L25 43 Z"/>
    <!-- equalizer bars -->
    <rect x="32" y="46" width="2" height="3.5"/>
    <rect x="36" y="42" width="2" height="7.5"/>
    <rect x="40" y="44" width="2" height="5.5"/>
    <rect x="44" y="40" width="2" height="9.5"/>
    <rect x="48" y="43" width="2" height="6.5"/>
    <rect x="52" y="45" width="2" height="4.5"/>
    <rect x="56" y="41" width="2" height="8.5"/>
    <rect x="60" y="44" width="2" height="5.5"/>
    <rect x="64" y="46" width="2" height="3.5"/>
    <rect x="68" y="43" width="2" height="6.5"/>
  </g>

  <!-- subtle horizontal highlight on body top -->
  <rect x="12" y="27.5" width="66" height="1.4" rx="0.7" fill="#ffffff" opacity="0.35"/>

  <!-- stand -->
  <rect x="38" y="64" width="14" height="3" rx="1" fill="#1f2125"/>
  <rect x="32" y="67" width="26" height="2" rx="1" fill="#1a1b1d"/>
</svg>
